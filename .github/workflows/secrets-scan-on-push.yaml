name: Secrets scan on push

on:
  workflow_call:
    inputs:
      trufflehog-version:
        description: "TruffleHog container image tag"
        type: string
        required: false
        default: "3.88.28"
      extra-args:
        description: "Additional TruffleHog CLI arguments"
        type: string
        required: false
        default: ""

jobs:
  scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/trufflesecurity/trufflehog:${{ inputs.trufflehog-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning
        run: >
          trufflehog git file://.
          --only-verified
          --since-commit=${{ github.event.before }}
          --fail
          ${{ inputs.extra-args }}
