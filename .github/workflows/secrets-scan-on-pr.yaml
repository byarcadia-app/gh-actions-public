name: Secrets scan on PR

on:
  workflow_call:
    inputs:
      trufflehog-version:
        description: "TruffleHog container image tag"
        type: string
        required: false
        default: "3.88.28"
      extra-args:
        description: "Additional TruffleHog CLI arguments"
        type: string
        required: false
        default: ""

jobs:
  scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/trufflesecurity/trufflehog:${{ inputs.trufflehog-version }}
    steps:
      - name: Compute fetch depth
        run: |
          echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning (PR annotations)
        continue-on-error: true
        run: >
          trufflehog git file://.
          --only-verified
          --max-depth=${{ env.PR_FETCH_DEPTH }}
          --fail
          --github-actions
          ${{ inputs.extra-args }}

      - name: Secret scanning (fail on verified secrets)
        run: >
          trufflehog git file://.
          --only-verified
          --max-depth=${{ env.PR_FETCH_DEPTH }}
          --fail
          ${{ inputs.extra-args }}
