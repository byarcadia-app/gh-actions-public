name: Sync skill to hub

on:
  workflow_call:
    inputs:
      skill-name:
        description: "Skill name (kebab-case, e.g. aether-setup)"
        type: string
        required: true
      skill-path:
        description: "Path to skill directory in the source repo"
        type: string
        required: true
      target-repo:
        description: "Target hub repository (owner/repo)"
        type: string
        required: false
        default: "byarcadia-app/hub"
      target-branch:
        description: "Target hub base branch"
        type: string
        required: false
        default: "main"
      target-skills-path:
        description: "Directory in hub where skills live"
        type: string
        required: false
        default: "skills"
    secrets:
      target-repo-token:
        description: "Token with write access to the target hub repo"
        required: true

jobs:
  sync:
    name: Sync ${{ inputs.skill-name }} to hub
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        env:
          SKILL_NAME: ${{ inputs.skill-name }}
          SKILL_PATH: ${{ inputs.skill-path }}
        run: |
          if ! echo "$SKILL_NAME" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
            echo "::error::Invalid skill name '${SKILL_NAME}': must be kebab-case"
            exit 1
          fi
          if echo "$SKILL_PATH" | grep -qE '(^/|\.\.)'; then
            echo "::error::Invalid skill path: ${SKILL_PATH}"
            exit 1
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout hub
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target-repo }}
          token: ${{ secrets.target-repo-token }}
          path: hub

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Sync skill
        env:
          SKILL_NAME: ${{ inputs.skill-name }}
          SKILL_PATH: ${{ inputs.skill-path }}
          TARGET_PATH: ${{ inputs.target-skills-path }}
        run: |
          SOURCE_DIR="source/${SKILL_PATH}"
          DEST_DIR="hub/${TARGET_PATH}/${SKILL_NAME}"

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "::error::Skill directory not found: ${SKILL_PATH}"
            exit 1
          fi

          rm -rf "$DEST_DIR"
          cp -r "$SOURCE_DIR" "$DEST_DIR"

      - name: Format synced files
        working-directory: hub
        run: deno fmt

      - name: Check for changes
        id: diff
        working-directory: hub
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No changes for ${{ inputs.skill-name }}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: hub
        env:
          GH_TOKEN: ${{ secrets.target-repo-token }}
          SKILL_NAME: ${{ inputs.skill-name }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          BRANCH="sync/skill-${SKILL_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git commit -m "sync(skills): update ${SKILL_NAME} from ${SOURCE_REPO}"
          git push -u origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "sync(skills): update ${SKILL_NAME} from ${SOURCE_REPO}" \
              --body "$(cat <<EOF
          ## Summary
          - Automated sync of \`${SKILL_NAME}\` from [\`${SOURCE_REPO}\`](https://github.com/${SOURCE_REPO})

          Generated by [sync-skill-to-hub](${{ github.server_url }}/${SOURCE_REPO}/actions/runs/${{ github.run_id }}) workflow.
          EOF
          )"
          else
            echo "::notice::PR #${EXISTING_PR} already exists, branch updated"
          fi
