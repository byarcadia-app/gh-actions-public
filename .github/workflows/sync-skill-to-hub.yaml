name: Sync skill to hub

on:
  workflow_call:
    inputs:
      skill-name:
        description: "Skill name (kebab-case, e.g. aether-setup)"
        type: string
        required: true
      skill-path:
        description: "Path to skill directory in the source repo"
        type: string
        required: true
      source-ref:
        description: "Source repo ref to checkout (empty = default branch)"
        type: string
        required: false
        default: ""
      target-repo:
        description: "Target hub repository (owner/repo)"
        type: string
        required: false
        default: "byarcadia-app/hub"
      target-branch:
        description: "Target hub base branch"
        type: string
        required: false
        default: "main"
      target-skills-path:
        description: "Directory in hub where skills live"
        type: string
        required: false
        default: "skills"
      format-command:
        description: "Format command to run on synced skill (empty to skip)"
        type: string
        required: false
        default: "deno fmt"
      pr-labels:
        description: "Comma-separated labels to add to the PR"
        type: string
        required: false
        default: ""
    secrets:
      target-repo-token:
        description: "Token with write access to the target hub repo"
        required: true
    outputs:
      changed:
        description: "Whether changes were detected"
        value: ${{ jobs.sync.outputs.changed }}
      pr-number:
        description: "PR number (empty if no PR created)"
        value: ${{ jobs.sync.outputs.pr-number }}
      pr-url:
        description: "PR URL (empty if no PR created)"
        value: ${{ jobs.sync.outputs.pr-url }}

jobs:
  sync:
    name: Sync ${{ inputs.skill-name }} to hub
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      pr-number: ${{ steps.pr.outputs.pr-number }}
      pr-url: ${{ steps.pr.outputs.pr-url }}

    steps:
      - name: Validate inputs
        env:
          SKILL_NAME: ${{ inputs.skill-name }}
          SKILL_PATH: ${{ inputs.skill-path }}
        run: |
          if ! echo "$SKILL_NAME" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
            echo "::error::Invalid skill name '${SKILL_NAME}': must be kebab-case"
            exit 1
          fi
          if echo "$SKILL_PATH" | grep -qE '(^/|\.\.)'; then
            echo "::error::Invalid skill path: ${SKILL_PATH}"
            exit 1
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-ref }}
          fetch-depth: 1
          path: source

      - name: Checkout hub
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target-repo }}
          token: ${{ secrets.target-repo-token }}
          ref: ${{ inputs.target-branch }}
          fetch-depth: 1
          path: hub

      - name: Sync skill
        env:
          SKILL_NAME: ${{ inputs.skill-name }}
          SKILL_PATH: ${{ inputs.skill-path }}
          TARGET_PATH: ${{ inputs.target-skills-path }}
        run: |
          SOURCE_DIR="source/${SKILL_PATH}"
          DEST_DIR="hub/${TARGET_PATH}/${SKILL_NAME}"

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "::error::Skill directory not found: ${SKILL_PATH}"
            exit 1
          fi

          rm -rf "$DEST_DIR"
          cp -r "$SOURCE_DIR" "$DEST_DIR"

      - name: Setup Deno
        if: inputs.format-command != '' && startsWith(inputs.format-command, 'deno')
        uses: denoland/setup-deno@v2

      - name: Format synced files
        if: inputs.format-command != ''
        working-directory: hub
        env:
          FORMAT_CMD: ${{ inputs.format-command }}
          SKILL_NAME: ${{ inputs.skill-name }}
          TARGET_PATH: ${{ inputs.target-skills-path }}
        run: $FORMAT_CMD "${TARGET_PATH}/${SKILL_NAME}"

      - name: Check for changes
        id: diff
        working-directory: hub
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No changes for ${{ inputs.skill-name }}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        id: pr
        if: steps.diff.outputs.changed == 'true'
        working-directory: hub
        env:
          GH_TOKEN: ${{ secrets.target-repo-token }}
          SKILL_NAME: ${{ inputs.skill-name }}
          SOURCE_REPO: ${{ github.repository }}
          TARGET_BRANCH: ${{ inputs.target-branch }}
          PR_LABELS: ${{ inputs.pr-labels }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="sync/skill-${SKILL_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git commit -m "sync(skills): update ${SKILL_NAME} from ${SOURCE_REPO}"
          git push -u origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$TARGET_BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            PR_URL=$(gh pr create \
              --base "$TARGET_BRANCH" \
              --title "sync(skills): update ${SKILL_NAME} from ${SOURCE_REPO}" \
              --body "$(cat <<EOF
          ## Summary
          - Automated sync of \`${SKILL_NAME}\` from [\`${SOURCE_REPO}\`](https://github.com/${SOURCE_REPO})

          Generated by [sync-skill-to-hub](${SERVER_URL}/${SOURCE_REPO}/actions/runs/${RUN_ID}) workflow.
          EOF
          )")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            PR_NUMBER="$EXISTING_PR"
            PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
            echo "::notice::PR #${PR_NUMBER} already exists, branch updated"
          fi

          if [ -n "$PR_LABELS" ]; then
            LABEL_FLAGS=()
            IFS=',' read -ra LABELS <<< "$PR_LABELS"
            for label in "${LABELS[@]}"; do
              LABEL_FLAGS+=(--add-label "$(echo "$label" | xargs)")
            done
            gh pr edit "$PR_NUMBER" "${LABEL_FLAGS[@]}"
          fi

          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"
